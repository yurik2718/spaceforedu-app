        identity:   "Документы удостоверения личности — на период действия дела."
        session:    "Данные сессии (IP, браузер) — 90 дней."
        requests:   "Дела и прикреплённые документы — 5 лет после закрытия."
        payments:   "События платежей — 13 месяцев."
        messages:   "Сообщения чата — на период действия дела."

    recipients:
      title: "4. Получатели и международные передачи данных"
      intro: "Ваши данные могут быть переданы следующим получателям:"
      stripe:
        name:     "Stripe, Inc."
        role:     "Обработчик платежей. Stripe может передавать данные за пределы ЕЭЗ на основании Стандартных договорных положений Европейской комиссии. Соглашение об обработке данных доступно на"
