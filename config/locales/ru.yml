    cookies:
      title: "7. Файлы cookie"
      body:  "Сайт использует только одну строго необходимую сессионную cookie для управления аутентифицированным доступом. Cookie истекает через 90 дней или при выходе из системы. Трекинг, рекламные и аналитические cookie третьих сторон не используются."

    complaints:
      title:     "8. Жалобы в AEPD"
      body_html: "Если вы считаете, что обработка ваших данных нарушает применимое законодательство, вы вправе подать жалобу в Испанское агентство по защите данных (AEPD): <a href='https://www.aepd.es' target='_blank' rel='noopener' class='link'>www.aepd.es</a>."
